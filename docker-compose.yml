version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./backups:/var/www/html/backups
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - MAIN_CHANNEL_ID=${MAIN_CHANNEL_ID}
      - SERIAL_CHANNEL_ID=${SERIAL_CHANNEL_ID}
      - THEATER_CHANNEL_ID=${THEATER_CHANNEL_ID}
      - BACKUP_CHANNEL_ID=${BACKUP_CHANNEL_ID}
      - PRIVATE_CHANNEL_1_ID=${PRIVATE_CHANNEL_1_ID}
      - PRIVATE_CHANNEL_2_ID=${PRIVATE_CHANNEL_2_ID}
      - REQUEST_GROUP_ID=${REQUEST_GROUP_ID}
      - ADMIN_ID=${ADMIN_ID}
      - MAIN_CHANNEL=${MAIN_CHANNEL}
      - SERIAL_CHANNEL=${SERIAL_CHANNEL}
      - THEATER_CHANNEL=${THEATER_CHANNEL}
      - BACKUP_CHANNEL=${BACKUP_CHANNEL}
      - REQUEST_GROUP=${REQUEST_GROUP}
    restart: unless-stopped
    
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost/"]
    interval: 30s
    timeout: 10s
    retries: 3