version: '3.8'

services:
  bot:
    build: .
    ports:
      - "8080:80"
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_ID=${ADMIN_ID}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - ./csv_data:/var/www/html/csv_data
      - ./movie_requests.json:/var/www/html/movie_requests.json
      - ./bot_activity.log:/var/www/html/bot_activity.log
    restart: unless-stopped