services:
  - type: web
    name: entertainment-tadka-bot
    runtime: image
    repo: https://github.com/yourusername/your-repo-name
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: PORT
        value: 10000
    healthCheckPath: /
    numInstances: 1